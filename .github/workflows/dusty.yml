name: dusty-packages

on:
  workflow_dispatch:
  schedule:
    # Quarterly: 06:00 UTC on the 1st of Jan / Apr / Jul / Oct.
    - cron: "0 6 1 */3 *"

jobs:
  dusty-report:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for dusty packages
        id: scan
        run: |
          set -euo pipefail

          threshold_days=365
          now=$(date +%s)
          threshold=$(( now - threshold_days * 24 * 3600 ))

          report="$RUNNER_TEMP/dusty.tsv"
          : > "$report"

          # Enumerate every category/package dir that contains an ebuild.
          # mindepth/maxdepth 3 pins the match to <cat>/<pkg>/<file>.ebuild,
          # so any stray .ebuild inside files/ or similar is ignored.
          mapfile -t pkgs < <(
            find . -mindepth 3 -maxdepth 3 -name '*.ebuild' -type f -printf '%h\n' \
              | sed 's|^\./||' \
              | sort -u
          )

          for pkg in "${pkgs[@]}"; do
            last_ts=$(git log -1 --format=%ct -- "$pkg" || true)
            [[ -z "$last_ts" ]] && continue
            if (( last_ts < threshold )); then
              age_days=$(( (now - last_ts) / 86400 ))
              last_date=$(date -u -d "@$last_ts" +%Y-%m-%d)
              printf '%d\t%s\t%s\n' "$age_days" "$last_date" "$pkg" >> "$report"
            fi
          done

          # Oldest first — most urgent on top.
          sort -rn -o "$report" "$report"

          count=$(wc -l < "$report")
          echo "count=$count"         >> "$GITHUB_OUTPUT"
          echo "report_path=$report"  >> "$GITHUB_OUTPUT"
          echo "threshold=$threshold_days" >> "$GITHUB_OUTPUT"

      # Turn the scan results into a rolling `dusty-packages` issue.
      # If one is already open, append this quarter's report as a comment;
      # otherwise, open a fresh issue. Close it when the listed packages
      # have been reviewed (bumped, dropped, or confirmed still current).
      - name: File dusty report as issue
        if: steps.scan.outputs.count != '0'
        uses: actions/github-script@v7
        env:
          REPORT_PATH: ${{ steps.scan.outputs.report_path }}
          DUSTY_COUNT: ${{ steps.scan.outputs.count }}
          THRESHOLD_DAYS: ${{ steps.scan.outputs.threshold }}
        with:
          script: |
            const fs = require('fs');
            const LABEL = 'dusty-packages';
            const when = new Date().toISOString().split('T')[0];
            const count = process.env.DUSTY_COUNT;
            const thresholdDays = process.env.THRESHOLD_DAYS;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const rows = fs.readFileSync(process.env.REPORT_PATH, 'utf8')
              .trimEnd()
              .split('\n')
              .map(line => {
                const [days, date, pkg] = line.split('\t');
                return `| \`${pkg}\` | ${date} | ${days} |`;
              });

            const body = [
              `Quarterly staleness report for ${when}.`,
              ``,
              `${count} package(s) have not been touched in over ${thresholdDays} days.`,
              ``,
              `| Package | Last touched | Days |`,
              `| ------- | ------------ | ---- |`,
              ...rows,
              ``,
              `Last-touched is determined by \`git log -1 --format=%ct -- <pkg>\``,
              `over the full repo history, so any commit affecting the package`,
              `directory (ebuild, metadata.xml, Manifest, patches) counts as a`,
              `touch.`,
              ``,
              `Run log: ${runUrl}`,
              ``,
              `This is an auto-generated report. Close the issue once the`,
              `listed packages have been reviewed — bumped, dropped, or`,
              `confirmed still current.`,
            ].join('\n');

            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: LABEL,
              state: 'open',
              per_page: 1,
            });

            if (existing.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing[0].number,
                body,
              });
              core.info(`Appended quarterly report to #${existing[0].number}`);
            } else {
              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Dusty packages (${when})`,
                body,
                labels: [LABEL],
              });
              core.info(`Opened new dusty-packages issue #${created.data.number}`);
            }
