name: Dusty packages

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Print the report to logs without filing/commenting on the issue tracker.'
        type: boolean
        default: false
      threshold_days:
        description: 'Days untouched before a package is reported as dusty. Empty = default (60).'
        type: number
        default: 60
  schedule:
    # Quarterly: 06:00 UTC on the 1st of Jan / Apr / Jul / Oct.
    - cron: "0 6 1 */3 *"

# Serialize concurrent runs (e.g. a manual workflow_dispatch fired during
# the scheduled cron). Issue creation is roughly idempotent but the report
# would land twice; let one finish before the other starts.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  dusty-report:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Scan for dusty packages
        id: scan
        env:
          # Empty on schedule (input resolves to '' there) → bash default of
          # 60 applies. workflow_dispatch sends the input value directly.
          INPUT_THRESHOLD_DAYS: ${{ inputs.threshold_days }}
        run: |
          set -euo pipefail

          threshold_days="${INPUT_THRESHOLD_DAYS:-60}"
          now=$(date +%s)
          threshold=$(( now - threshold_days * 24 * 3600 ))

          report="$RUNNER_TEMP/dusty.tsv"
          : > "$report"

          # Enumerate every category/package dir that contains an ebuild.
          # mindepth/maxdepth 3 pins the match to <cat>/<pkg>/<file>.ebuild,
          # so any stray .ebuild inside files/ or similar is ignored.
          mapfile -t pkgs < <(
            find . -mindepth 3 -maxdepth 3 -name '*.ebuild' -type f -printf '%h\n' \
              | sed 's|^\./||' \
              | sort -u
          )

          # metadata.xml-only commits (e.g. overlay-wide normalization
          # sweeps) don't reflect package-level maintenance, so exclude
          # them from the last-touch lookup. Ebuild/Manifest/files/**
          # changes still count.
          for pkg in "${pkgs[@]}"; do
            last_ts=$(git log -1 --format=%ct -- "$pkg" ":(exclude)$pkg/metadata.xml" || true)
            [[ -z "$last_ts" ]] && continue
            if (( last_ts < threshold )); then
              age_days=$(( (now - last_ts) / 86400 ))
              last_date=$(date -u -d "@$last_ts" +%Y-%m-%d)
              printf '%d\t%s\t%s\n' "$age_days" "$last_date" "$pkg" >> "$report"
            fi
          done

          # Oldest first — most urgent on top.
          sort -rn -o "$report" "$report"

          count=$(wc -l < "$report")
          echo "count=$count"         >> "$GITHUB_OUTPUT"
          echo "report_path=$report"  >> "$GITHUB_OUTPUT"
          echo "threshold=$threshold_days" >> "$GITHUB_OUTPUT"

      # Dry-run preview: print what the workflow would file or close, then
      # skip the issue-tracker steps below. Triggered via
      # `gh workflow run dusty.yml -f dry_run=true` (or the UI checkbox);
      # `inputs.dry_run` resolves to the empty string on schedule, so
      # cron-driven runs always go through the live path.
      - name: Print dry-run preview
        if: inputs.dry_run == 'true'
        env:
          REPORT_PATH: ${{ steps.scan.outputs.report_path }}
          DUSTY_COUNT: ${{ steps.scan.outputs.count }}
          THRESHOLD_DAYS: ${{ steps.scan.outputs.threshold }}
        run: |
          set -euo pipefail
          echo "DRY RUN — issue tracker will not be touched."
          echo "Threshold: ${THRESHOLD_DAYS} days"
          echo "Count:     ${DUSTY_COUNT}"
          if [[ "${DUSTY_COUNT}" == "0" ]]; then
            echo "Action that would fire: auto-close any open dusty-packages issue."
          else
            echo "Action that would fire: file/append a dusty-packages report."
            echo "--- TSV (age_days, last_touched, package) ---"
            cat "${REPORT_PATH}"
          fi

      # Turn the scan results into a rolling `dusty-packages` issue.
      # If one is already open, append this quarter's report as a comment;
      # otherwise, open a fresh issue. Close it when the listed packages
      # have been reviewed (bumped, dropped, or confirmed still current).
      - name: File dusty report as issue
        if: steps.scan.outputs.count != '0' && inputs.dry_run != 'true'
        uses: actions/github-script@v8
        env:
          REPORT_PATH: ${{ steps.scan.outputs.report_path }}
          DUSTY_COUNT: ${{ steps.scan.outputs.count }}
          THRESHOLD_DAYS: ${{ steps.scan.outputs.threshold }}
        with:
          script: |
            const fs = require('fs');
            const LABEL = 'dusty-packages';
            const when = new Date().toISOString().split('T')[0];
            const count = process.env.DUSTY_COUNT;
            const thresholdDays = process.env.THRESHOLD_DAYS;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const rows = fs.readFileSync(process.env.REPORT_PATH, 'utf8')
              .trimEnd()
              .split('\n')
              .map(line => {
                const [days, date, pkg] = line.split('\t');
                return `| \`${pkg}\` | ${date} | ${days} |`;
              });

            const body = [
              `Quarterly staleness report for ${when}.`,
              ``,
              `${count} package(s) have not been touched in over ${thresholdDays} days.`,
              ``,
              `| Package | Last touched | Days |`,
              `| ------- | ------------ | ---- |`,
              ...rows,
              ``,
              `Last-touched excludes metadata.xml-only commits, so an ebuild,`,
              `Manifest, or files/** change counts but an overlay-wide`,
              `metadata.xml normalization sweep does not. Determined via`,
              `\`git log -1 -- <pkg> :(exclude)<pkg>/metadata.xml\`.`,
              ``,
              `Run log: ${runUrl}`,
              ``,
              `This is an auto-generated report. Close the issue once the`,
              `listed packages have been reviewed — bumped, dropped, or`,
              `confirmed still current.`,
            ].join('\n');

            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: LABEL,
              state: 'open',
              per_page: 1,
            });

            if (existing.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing[0].number,
                body,
              });
              core.info(`Appended quarterly report to #${existing[0].number}`);
            } else {
              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Dusty packages (${when})`,
                body,
                labels: [LABEL],
              });
              core.info(`Opened new dusty-packages issue #${created.data.number}`);
            }

      # When a scheduled run reports zero dusty packages and a
      # dusty-packages issue is still open from a prior quarter, append an
      # "all clear" comment and auto-close. Without this, the issue lives
      # until manually closed even after every listed package has been
      # bumped or dropped.
      - name: Auto-close dusty-packages issue when none remain
        if: steps.scan.outputs.count == '0' && inputs.dry_run != 'true'
        uses: actions/github-script@v8
        with:
          script: |
            const LABEL = 'dusty-packages';
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: LABEL,
              state: 'open',
              per_page: 1,
            });

            if (existing.length === 0) {
              core.info('No open dusty-packages issue; nothing to close.');
              return;
            }

            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: existing[0].number,
              body: `Quarterly scan reports zero dusty packages: ${runUrl}\n\nAuto-closing.`,
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: existing[0].number,
              state: 'closed',
              state_reason: 'completed',
            });
            core.info(`Auto-closed #${existing[0].number}`);
