name: pkgcheck

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - '*/**.ebuild'
      - '**/metadata.xml'
      - 'profiles/**'
      - 'eclass/**'
  pull_request:
    branches: [master]
  schedule:
    - cron: "0 6 */3 * *"  # every 3 days at 6 AM UTC

jobs:
  pkgcheck-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pkgcore/pkgcheck-action@v1
        with:
          args: scan --commits

  pkgcheck-push:
    # Skip branch-creation pushes (github.event.before is all zeros then,
    # which pkgcheck cannot resolve).
    if: >
      github.event_name == 'push' &&
      github.event.before != '0000000000000000000000000000000000000000'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pkgcore/pkgcheck-action@v1
        with:
          args: scan --commits ${{ github.event.before }}

  pkgcheck-full:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4

      - uses: pkgcore/pkgcheck-action@v1
        with:
          args: scan --net

      # Turn a failing scheduled run into a visible issue rather than a
      # silent red dot in the Actions tab. On failure, find an existing
      # open `pkgcheck-failure` issue and append a comment; otherwise
      # open a new one.
      - name: Surface scheduled-run failure as issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const LABEL = 'pkgcheck-failure';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const now = new Date().toISOString();
            const when = now.split('T')[0];
            const body = [
              `The scheduled \`pkgcheck scan --net\` run on ${now} failed.`,
              ``,
              `Run log: ${runUrl}`,
              ``,
              `This is the auto-generated failure signal. Close this issue`,
              `once the next scheduled run passes, or the underlying cause`,
              `has been fixed.`,
            ].join('\n');

            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: LABEL,
              state: 'open',
              per_page: 1,
            });

            if (existing.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing[0].number,
                body,
              });
              core.info(`Appended failure comment to #${existing[0].number}`);
            } else {
              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `pkgcheck --net is failing (${when})`,
                body,
                labels: [LABEL],
              });
              core.info(`Opened new failure issue #${created.data.number}`);
            }
