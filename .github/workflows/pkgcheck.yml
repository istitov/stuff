name: pkgcheck

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - '*/**.ebuild'
      - '**/metadata.xml'
      - '**/Manifest'
      - 'profiles/**'
      - 'eclass/**'
      - 'licenses/**'
      - '.github/workflows/pkgcheck.yml'
  pull_request:
    branches: [master]
  schedule:
    - cron: "0 6 */3 * *"  # every 3 days at 6 AM UTC

# Cancel in-progress runs of the same workflow + ref + event when a newer
# trigger arrives. Scope by event_name so that a push to master doesn't
# cancel a concurrently-running scheduled --net scan (different
# coverage); only same-event-type runs collapse onto each other.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  pkgcheck-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: pkgcore/pkgcheck-action@8491e92faa1010d5c6947c114d23215e5a74684e # main 2026-03-24
        with:
          args: --commits origin/${{ github.base_ref }}

  pkgcheck-push:
    # Skip branch-creation pushes (github.event.before is all zeros then,
    # which pkgcheck cannot resolve).
    if: >
      github.event_name == 'push' &&
      github.event.before != '0000000000000000000000000000000000000000'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # Resolve the base ref pkgcheck should diff against. Normally this is
      # github.event.before — the previous tip of the pushed branch. After a
      # force-push, that SHA may be unreachable (GC'd) or not in this clone;
      # fall back to HEAD~1 so the run still scans at least the new tip.
      - id: base
        run: |
          set -euo pipefail
          before='${{ github.event.before }}'
          if git cat-file -e "${before}^{commit}" 2>/dev/null; then
            echo "ref=${before}" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::${before} unreachable (force-push?), falling back to HEAD~1"
            echo "ref=HEAD~1" >> "$GITHUB_OUTPUT"
          fi

      - uses: pkgcore/pkgcheck-action@8491e92faa1010d5c6947c114d23215e5a74684e # main 2026-03-24
        with:
          args: --commits ${{ steps.base.outputs.ref }}

  pkgcheck-full:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v5

      - uses: pkgcore/pkgcheck-action@8491e92faa1010d5c6947c114d23215e5a74684e # main 2026-03-24
        with:
          args: --net

      # Turn a failing scheduled run into a visible issue rather than a
      # silent red dot in the Actions tab. On failure, find an existing
      # open `pkgcheck-failure` issue and append a comment; otherwise
      # open a new one.
      - name: Surface scheduled-run failure as issue
        if: failure()
        uses: actions/github-script@v8
        with:
          script: |
            const LABEL = 'pkgcheck-failure';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const now = new Date().toISOString();
            const when = now.split('T')[0];
            const body = [
              `The scheduled \`pkgcheck scan --net\` run on ${now} failed.`,
              ``,
              `Run log: ${runUrl}`,
              ``,
              `This is the auto-generated failure signal. Close this issue`,
              `once the next scheduled run passes, or the underlying cause`,
              `has been fixed.`,
            ].join('\n');

            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: LABEL,
              state: 'open',
              per_page: 1,
            });

            if (existing.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing[0].number,
                body,
              });
              core.info(`Appended failure comment to #${existing[0].number}`);
            } else {
              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `pkgcheck --net is failing (${when})`,
                body,
                labels: [LABEL],
              });
              core.info(`Opened new failure issue #${created.data.number}`);
            }

      # When a scheduled run passes and a pkgcheck-failure issue is still
      # open from a prior failure, close it. Without this, a single
      # transient --net flake leaves the issue open indefinitely.
      - name: Auto-close pkgcheck-failure issue on success
        if: success()
        uses: actions/github-script@v8
        with:
          script: |
            const LABEL = 'pkgcheck-failure';
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: LABEL,
              state: 'open',
              per_page: 1,
            });

            if (existing.length === 0) {
              core.info('No open pkgcheck-failure issue; nothing to close.');
              return;
            }

            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: existing[0].number,
              body: `Scheduled \`pkgcheck scan --net\` run passed: ${runUrl}\n\nAuto-closing.`,
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: existing[0].number,
              state: 'closed',
              state_reason: 'completed',
            });
            core.info(`Auto-closed #${existing[0].number}`);
