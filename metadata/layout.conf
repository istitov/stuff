# Inherits from ::gentoo: manifest-hashes, eapis-banned,
# cache-formats, properties-allowed, restrict-allowed.
masters = gentoo
# Manifests carry only DIST entries, no per-file checksums for
# in-tree files.
thin-manifests = true
# Working-branch override (2026-06-09): signing disabled locally for
# unsigned WIP commits. master stays sign-commits = true, signed at
# push; kept on rebase via merge=ours, not promoted to master.
sign-commits = false
