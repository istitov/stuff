[DEFAULT]
# Suppressions applied repo-wide. pkgcheck only honors [DEFAULT],
# [CHECKSETS], and repo-alias sections; per-package suppression via
# [category/pkg] is not supported, so every entry here is global.
#
# RedundantVersionCheck:
#   Retention policy ("last two plus last-of-major-series") keeps older
#   slots on purpose for rollback. pkgcheck cannot tell deliberate
#   retention from forgotten cruft, so the whole check fires constantly
#   on packages we want to keep.
#
# NonsolvableDepsIn{Dev,Exp}:
#   Niche profiles (x32, musl, hardened) routinely lack keywords on
#   upstream sci-python deps. Verified concretely on 2026-04-23: a
#   re-enabled run surfaced 45 findings, split 26/x32 + 19/musl.
#   The x32 cluster is driven by dev-python/ipywidgets, jupyterlab,
#   jupyter-server-proxy and plotly not being ~amd64-keyworded on
#   the x32 sub-profile - hitting pyxem, abtem, ipympl,
#   hyperspy-gui-ipywidgets, dask-labextension, sasmodels, bumps.
#   The musl cluster is driven by dev-util/nvidia-cuda-toolkit,
#   dev-libs/cusparselt, dev-util/ruff, dev-python/sphinxcontrib-bibtex,
#   hatch-* and (now masked) sci-physics/ifeffit - hitting cupy,
#   mumax, prismatic, matplotlib-scalebar, colorspacious, sasview,
#   demeter. All are legitimate ~amd64 claims against sub-profiles
#   with narrower dep coverage; fixing would mean per-package
#   profile-specific masks for archs nobody using this overlay
#   consumes. Not actionable from this overlay.
#
# UnderscoreInUseFlag, PythonMismatchedPackageName, RequiredUseDefaults:
#   Triggered by the locally-vendored *_py2 eclasses and the matching
#   dev-python/*-python2 packages, which intentionally keep the
#   python_targets_python2_7 USE flag and do not rename to match their
#   py3 upstreams (they are py2-only forks kept after ::gentoo dropped
#   py2 support). Expected by design.
#
# UnusedEclasses:
#   eclass/python-single-r1_py2.eclass is never directly inherited by
#   an ebuild. It is reached transitively via distutils-r1_py2 when a
#   consumer sets DISTUTILS_SINGLE_IMPL=1 (currently pycairo-python2
#   and both sk1 ebuilds; confirmed 2026-04-23). pkgcheck does not
#   statically trace conditional `inherit` branches inside eclasses
#   and the @PROVIDES hint does not help here either, so the warning
#   fires even though the eclass is load-bearing for those three
#   ebuilds. Suppress; the check would only be reliable again if the
#   eclass were inlined or DISTUTILS_SINGLE_IMPL usage dropped.
#
# DeprecatedDep is intentionally left enabled: several findings
# (gwyddion gtksourceview:2, mantid pyqt5/versioningit, qscintilla qt5,
# dwarftherapist qt5, gtk+ gtk-engines-adwaita) are real pending
# migrations that we want surfaced.

checks = -RedundantVersionCheck
keywords = -NonsolvableDepsInDev,-NonsolvableDepsInExp,-UnderscoreInUseFlag,-PythonMismatchedPackageName,-RequiredUseDefaults,-UnusedEclasses
