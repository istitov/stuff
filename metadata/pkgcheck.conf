[DEFAULT]
# Suppressions applied repo-wide. pkgcheck only honors [DEFAULT],
# [CHECKSETS], and repo-alias sections; per-package suppression via
# [category/pkg] is not supported, so every entry here is global.
#
# RedundantVersionCheck:
#   Retention policy ("last two plus last-of-major-series") keeps older
#   slots on purpose for rollback. pkgcheck cannot tell deliberate
#   retention from forgotten cruft, so the whole check fires constantly
#   on packages we want to keep.
#
# NonsolvableDepsIn{Dev,Exp}:
#   Niche profiles (x32, musl, hardened) routinely lack keywords on
#   upstream sci-python deps. Not actionable from this overlay.
#
# UnderscoreInUseFlag, PythonMismatchedPackageName, RequiredUseDefaults:
#   Triggered by the locally-vendored *_py2 eclasses and the matching
#   dev-python/*-python2 packages, which intentionally keep the
#   python_targets_python2_7 USE flag and do not rename to match their
#   py3 upstreams (they are py2-only forks kept after ::gentoo dropped
#   py2 support). Expected by design.
#
# DeprecatedDep is intentionally left enabled: several findings
# (gwyddion gtksourceview:2, mantid pyqt5/versioningit, qscintilla qt5,
# dwarftherapist qt5, gtk+ gtk-engines-adwaita) are real pending
# migrations that we want surfaced.

checks = -RedundantVersionCheck
keywords = -NonsolvableDepsInDev,-NonsolvableDepsInExp,-UnderscoreInUseFlag,-PythonMismatchedPackageName,-RequiredUseDefaults
